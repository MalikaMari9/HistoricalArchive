<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Apply as Curator</title>
</head>
<body>

<h2>Curator Application Form</h2>

<form th:action="@{/curator/apply}" th:object="${application}" method="post" enctype="multipart/form-data">
    
    <label>First Name:</label>
    <input type="text" th:field="*{fname}" required /><br><br>

    <label>Last Name:</label>
    <input type="text" th:field="*{lname}" required /><br><br>

    <label>Date of Birth:</label>
    <input type="date" th:field="*{dob}" required /><br><br>

    <label>Certification Title:</label>
    <input type="text" th:field="*{certification}" required /><br><br>

    <label>Upload Certification File (PDF or Image):</label>
    <input type="file" name="certificationFile" accept=".pdf,.jpg,.jpeg,.png" required /><br><br>

    <button type="submit">Submit Application</button>
</form>

<!-- Show error/success messages -->
<p th:if="${error}" th:text="${error}" style="color:red;"></p>
<p th:if="${success}" th:text="${success}" style="color:green;"></p>

</body>
</html>
